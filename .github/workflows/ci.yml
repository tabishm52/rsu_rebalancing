name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (locked)
        run: uv sync --extra dev --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check .

      - name: Type-check
        run: uv run mypy

      - name: Test
        run: uv run pytest -q

      - name: README assets up to date
        # Regenerate the README tables from the price fixture (offline) and fail if they
        # drifted. PNGs are regenerated in the same pass but not byte-diffed.
        run: |
          uv run python assets/generate_assets.py
          git diff --exit-code -- README.md
